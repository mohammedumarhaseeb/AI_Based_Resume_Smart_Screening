{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card p-5 border-tops" style="border-top: 4px solid var(--primary);">
            <div class="text-center mb-4">
                <img src="{{ url_for('static', filename='img/logo.png') }}" alt="SmartScreen AI Logo" class="img-fluid" style="max-height: 80px;">
            </div>
            <h2 class="mb-2 text-center">Recruiter Portal</h2>
            <p class="text-muted mb-4 text-center">Bulk process candidate resumes and rank them against a specific job role to optimize your hiring funnel.</p>
            
            <form action="{{ url_for('recruiter') }}" id="recruiterForm" method="POST" enctype="multipart/form-data">
                
                <div class="mb-4">
                    <label class="form-label fw-bold d-flex align-items-center">
                        <i class="bi bi-briefcase text-primary me-2"></i> 1. Select Job Role / Position
                    </label>
                    <select name="job_role_select" id="job_role_select" class="form-select form-select-lg" required onchange="handleRoleChange()">
                        <option value="" selected disabled>Choose a role...</option>
                        <option value="Data Analyst">Data Analyst</option>
                        <option value="Data Scientist">Data Scientist</option>
                        <option value="Machine Learning Engineer">Machine Learning Engineer</option>
                        <option value="Business Analyst">Business Analyst</option>
                        <option value="Software Engineer">Software Engineer</option>
                        <option value="AI Engineer">AI Engineer</option>
                        <option value="Other">Other (Type Manually)</option>
                    </select>
                    
                    <div id="custom_role_wrapper" class="mt-3 d-none">
                        <input type="text" name="job_role_custom" id="job_role_custom" class="form-control" placeholder="Enter your specific job role...">
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label fw-bold"><i class="bi bi-file-earmark-arrow-up text-primary me-2"></i>2. Upload Resumes (Bulk)</label>
                    <div class="file-upload-wrapper mt-2">
                        <input type="file" id="resumeUpload" name="resumes" accept=".pdf,.docx,.jpg,.png,.jpeg" class="form-control" multiple required>
                    </div>
                    <div class="form-text mt-2 text-muted">Select multiple files (500-1000+ supported). You can keep adding more files.</div>
                    
                    <!-- Container to elegantly display selected files -->
                    <div id="fileList" class="mt-3 d-flex flex-wrap gap-2"></div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label fw-bold"><i class="bi bi-card-text text-primary me-2"></i>3. Paste Job Requirements</label>
                    <textarea name="job_desc" id="job_desc" class="form-control" rows="6" placeholder="Paste the target job description or requirements here..." required></textarea>
                </div>
                
                <div class="d-grid mt-4">
                    <button type="submit" id="submitBtn" class="btn btn-primary btn-lg rounded-pill py-3 fw-bold shadow-sm">
                        <span id="btnText">Screen Candidates</span>
                        <span id="btnLoader" class="d-none">
                            <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                            Analyzing Resumes in Bulk...
                        </span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    const jobDescriptions = {
        "Data Analyst": "We are looking for a Data Analyst skilled in Python, SQL, Excel, Data Visualization, Power BI, and Statistics to analyze data and generate insights.",
        "Data Scientist": "We are looking for a Data Scientist with expertise in Python, Machine Learning, Statistics, Data Modeling, and Big Data technologies to solve complex problems.",
        "Machine Learning Engineer": "We are looking for a Machine Learning Engineer to build and deploy ML models using Python, TensorFlow, PyTorch, and Docker.",
        "Business Analyst": "We are looking for a Business Analyst to bridge the gap between IT and business using SQL, Data Visualization, and strong communication skills.",
        "Software Engineer": "We are looking for a Software Engineer proficient in Java/Python, Web Development (React/Angular), SQL, and Git.",
        "AI Engineer": "We are looking for an AI Engineer to develop AI solutions using NLP, Deep Learning, Generative AI models, and Python."
    };

    function handleRoleChange() {
        const roleSelect = document.getElementById('job_role_select');
        const customWrapper = document.getElementById('custom_role_wrapper');
        const customInput = document.getElementById('job_role_custom');
        const jdTextArea = document.getElementById('job_desc');
        const selectedRole = roleSelect.value;
        
        if (selectedRole === 'Other') {
            customWrapper.classList.remove('d-none');
            customInput.required = true;
            jdTextArea.value = '';
        } else {
            customWrapper.classList.add('d-none');
            customInput.required = false;
            if (jobDescriptions[selectedRole]) {
                jdTextArea.value = jobDescriptions[selectedRole];
            }
        }
    }

    // DataTransfer object to maintain the cumulative list of files
    const dt = new DataTransfer();
    const resumeUpload = document.getElementById('resumeUpload');
    const fileListContainer = document.getElementById('fileList');

    resumeUpload.addEventListener('change', function(e) {
        // Add new files to our DataTransfer object
        for (let i = 0; i < this.files.length; i++) {
            const file = this.files[i];
            
            // Avoid duplicate files by name and size
            const isDuplicate = Array.from(dt.files).some(f => f.name === file.name && f.size === file.size);
            if (!isDuplicate) {
                dt.items.add(file);
            }
        }
        
        // Sync the input's files with our cumulative DataTransfer object
        this.files = dt.files;
        
        // Update UI
        updateFileListUI();
    });

    function updateFileListUI() {
        fileListContainer.innerHTML = ''; 
        
        Array.from(dt.files).forEach((file, index) => {
            const fileBadge = document.createElement('div');
            fileBadge.className = 'badge bg-light text-dark border border-secondary-subtle px-3 py-2 rounded-pill shadow-sm d-flex align-items-center fw-medium';
            
            let iconClass = 'bi-file-earmark-text text-secondary';
            if (file.name.toLowerCase().endsWith('.pdf')) {
                iconClass = 'bi-file-earmark-pdf text-danger';
            } else if (file.name.toLowerCase().endsWith('.docx') || file.name.toLowerCase().endsWith('.doc')) {
                iconClass = 'bi-file-earmark-word text-primary';
            } else if (file.name.toLowerCase().match(/\.(jpg|jpeg|png)$/)) {
                iconClass = 'bi-file-earmark-image text-success';
            }
            
            fileBadge.innerHTML = `
                <i class="bi ${iconClass} fs-6 me-2"></i>
                ${file.name}
                <i class="bi bi-x-lg ms-2 text-muted" onclick="removeFile(${index})" style="cursor: pointer;"></i>
            `;
            fileListContainer.appendChild(fileBadge);
        });
    }

    window.removeFile = function(index) {
        const newDt = new DataTransfer();
        const files = dt.files;
        for (let i = 0; i < files.length; i++) {
            if (i !== index) newDt.items.add(files[i]);
        }
        
        // Clear and re-add to main dt
        while(dt.items.length > 0) dt.items.remove(0);
        for(let i=0; i<newDt.files.length; i++) dt.items.add(newDt.files[i]);
        
        resumeUpload.files = dt.files;
        updateFileListUI();
    }

    document.getElementById('recruiterForm').addEventListener('submit', function() {
        const btn = document.getElementById('submitBtn');
        const text = document.getElementById('btnText');
        const loader = document.getElementById('btnLoader');
        
        btn.disabled = true;
        text.classList.add('d-none');
        loader.classList.remove('d-none');
    });
</script>
{% endblock %}
